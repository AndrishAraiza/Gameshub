<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #18191a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .form-signin {
            width: 100%;
            max-width: 380px;
            padding: 2rem;
            background: #242526;
            border-radius: 16px;
            border: 1px solid #3a3b3c;
        }
        .form-signin .form-floating { margin-bottom: 1rem; }
        .form-floating > .form-control { background: #18191a; color: #e4e6eb; border-color: #3a3b3c; }
        .form-floating > .form-control:focus { border-color: #2374e1; box-shadow: 0 0 0 3px rgba(35,116,225,0.15); background: #18191a; color: #e4e6eb; }
        .form-floating > label { color: #b0b3b8; }
    </style>
</head>
<body>

    <main class="form-signin">
        <form method="POST">
            <h1 class="h4 fw-bold mb-1 text-white">🎮 GameHub</h1>
            <p class="text-secondary mb-4" style="font-size:0.88rem;">Inicia sesión para continuar</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% for category, message in messages %}
                <div class="alert alert-danger py-2 small">{{ message }}</div>
                {% endfor %}
            {% endwith %}

            <div class="form-floating">
                <input type="email" name="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
                <label for="email">Correo electrónico</label>
            </div>

            <div class="form-floating">
                <input type="password" name="password" class="form-control" id="password" placeholder="Contraseña" required>
                <label for="password">Contraseña</label>
            </div>

            <button class="btn btn-primary w-100 py-2 mt-2" type="submit">Iniciar sesión</button>

            <p class="text-center text-secondary mt-3 mb-0" style="font-size:0.88rem;">
                ¿No tienes cuenta? <a href="/register" class="text-primary">Regístrate</a>
            </p>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
