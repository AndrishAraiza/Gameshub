<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo post — GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #18191a; color: #e4e6eb; font-family: 'Segoe UI', sans-serif; }
        .top-navbar { background-color: #242526; height: 56px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #3a3b3c; }
        .form-control, .form-select {
            background: #242526;
            border: 1px solid #3a3b3c;
            color: #e4e6eb;
            border-radius: 10px;
        }
        .form-control:focus, .form-select:focus {
            background: #242526;
            border-color: #2374e1;
            color: #e4e6eb;
            box-shadow: 0 0 0 3px rgba(35,116,225,0.15);
        }
        .form-select option { background: #242526; }
        label { color: #b0b3b8; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="top-navbar d-flex align-items-center px-4">
        <span class="fs-5 me-2">🎮</span>
        <span class="fw-bold me-4">Game<span style="color:#2374e1">Hub</span> Admin</span>
        <a href="/admin" class="btn btn-sm btn-secondary">
            ← Volver al dashboard
        </a>
    </div>

    <div class="container mt-4" style="max-width: 720px;">
        <h4 class="fw-bold mb-1">Nuevo post</h4>
        <p class="text-secondary small mb-4">Completa los campos para publicar</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label>Título</label>
                <input type="text" name="title" class="form-control mt-1" placeholder="Ej: Temporada 14 ya disponible" required>
            </div>
            <div class="mb-3">
                <label>Contenido</label>
                <textarea name="content" class="form-control mt-1" rows="6" placeholder="Escribe el contenido del post..." required></textarea>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label>Juego</label>
                    <select name="game_id" class="form-select mt-1" required>
                        <option value="">Selecciona un juego</option>
                        {% for game in games %}
                        <option value="{{ game.id }}">{{ game.icon_emoji }} {{ game.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label>Tipo de post</label>
                    <select name="post_type" class="form-select mt-1">
                        <option value="news">📰 Noticia</option>
                        <option value="guide">📖 Guía</option>
                        <option value="update">🔄 Actualización</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                    <i class="bi bi-send me-1"></i> Publicar
                </button>
                <a href="/admin" class="btn btn-secondary px-4">Cancelar</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
