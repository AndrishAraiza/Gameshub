<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Editar {{ game.name }} — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #18191a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .form-control, .form-select { background: #242526; border: 1px solid #3a3b3c; color: #fff; border-radius: 10px; }
        .top-navbar { background-color: #242526; height: 56px; border-bottom: 1px solid #3a3b3c; display: flex; align-items: center; padding: 0 1.5rem; }
    </style>
</head>
<body>
    
    <div class="top-navbar">
        <span class="fw-bold me-4">Game<span style="color:#2374e1">Hub</span> Admin</span>
        <a href="/admin" class="btn btn-sm btn-secondary">← Volver al Panel</a>
    </div>

    <div class="container mt-4 mb-5" style="max-width: 800px;">
        <h4 class="fw-bold mb-4">Editar Comunidad: {{ game.name }}</h4>
        <form method="POST" class="row g-3">
            <div class="col-md-6">
                <label class="small text-secondary">Nombre del Juego</label>
                <input type="text" name="name" class="form-control" value="{{ game.name }}" required>
            </div>
            <div class="col-md-6">
                <label class="small text-secondary">Categoría</label>
                <select name="genre_id" class="form-select" required>
                    {% for g in genres %}
                    <option value="{{ g.id }}" {% if g.id == game.genre_id %}selected{% endif %}>{{ g.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="small text-secondary">Slug</label>
                <input type="text" name="slug" class="form-control" value="{{ game.slug }}" required>
            </div>
            <div class="col-md-6">
                <label class="small text-secondary">Emoji</label>
                <input type="text" name="icon_emoji" class="form-control" value="{{ game.icon_emoji }}">
            </div>
            <div class="col-12">
                <label class="small text-secondary">Reseña / Información</label>
                <textarea name="description" class="form-control" rows="3">{{ game.description }}</textarea>
            </div>
            <div class="col-12">
                <label class="small text-secondary">URL Imagen/GIF de Fondo</label>
                <input type="url" name="banner_image" class="form-control" value="{{ game.banner_image or '' }}">
                <div class="form-text text-secondary" style="font-size: 0.75rem;">Asegúrate de que el enlace termine en .gif o .jpg (Clic derecho en la imagen -> Copiar dirección de la imagen).</div>
            </div>
            <div class="col-12">
                <label class="small text-secondary">URL Música (.mp3)</label>
                <input type="url" name="music_url" class="form-control" value="{{ game.music_url or '' }}">
            </div>
            <div class="col-md-6">
                <label class="small text-secondary">Color Banner</label>
                <input type="color" name="banner_color" class="form-control form-control-color w-100" value="{{ game.banner_color }}">
            </div>
            <div class="col-md-6">
                <label class="small text-secondary">Color Acento</label>
                <input type="color" name="accent_color" class="form-control form-control-color w-100" value="{{ game.accent_color }}">
            </div>
            <div class="col-12 pt-3">
                <button type="submit" class="btn btn-primary px-4">Guardar Cambios</button>
                <a href="/admin" class="btn btn-secondary ms-2">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
