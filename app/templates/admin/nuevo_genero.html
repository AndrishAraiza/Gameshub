<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Nueva Categoría — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #18191a; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .form-control { background: #242526; border: 1px solid #3a3b3c; color: #fff; border-radius: 10px; }
        .emoji-picker-container {
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            width: 280px;
            background: #242526;
            border: 1px solid #3a3b3c;
        }
        .emoji-picker-container::-webkit-scrollbar { width: 6px; }
        .emoji-picker-container::-webkit-scrollbar-thumb { background: #3a3b3c; border-radius: 10px; }
        .emoji-btn { font-size: 1.2rem; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .emoji-section-title { font-size: 0.7rem; color: #b0b3b8; text-transform: uppercase; width: 100%; margin-top: 10px; margin-bottom: 5px; }
    </style>
</head>
<body class="p-4">
    <div class="container" style="max-width: 500px;">
        <h4 class="fw-bold">Nueva Categoría</h4>
        <form method="POST" class="mt-4">
            <div class="mb-3">
                <label class="small text-secondary">Nombre de la Categoría</label>
                <input type="text" name="name" class="form-control" placeholder="Ej: Acción" required>
            </div>
            <div class="mb-3">
                <label class="small text-secondary">Slug</label>
                <input type="text" name="slug" class="form-control" placeholder="accion" required>
            </div>
            <div class="mb-4">
                <label class="small text-secondary">Icono Emoji</label>
                <div class="input-group mt-1">
                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">😀</button>
                    <div class="dropdown-menu shadow emoji-picker-container">
                        <div class="d-flex flex-wrap gap-1">
                            <div class="emoji-section-title">Gaming</div>
                            <button type="button" class="btn btn-dark emoji-btn">🎮</button>
                            <button type="button" class="btn btn-dark emoji-btn">🕹️</button>
                            <button type="button" class="btn btn-dark emoji-btn">👾</button>
                            <button type="button" class="btn btn-dark emoji-btn">🧩</button>
                            <div class="emoji-section-title">Acción & RPG</div>
                            <button type="button" class="btn btn-dark emoji-btn">⚔️</button>
                            <button type="button" class="btn btn-dark emoji-btn">🛡️</button>
                            <button type="button" class="btn btn-dark emoji-btn">🗡️</button>
                            <button type="button" class="btn btn-dark emoji-btn">🧙</button>
                            <button type="button" class="btn btn-dark emoji-btn">🐉</button>
                            <div class="emoji-section-title">Shooter & Terror</div>
                            <button type="button" class="btn btn-dark emoji-btn">🔫</button>
                            <button type="button" class="btn btn-dark emoji-btn">🎯</button>
                            <button type="button" class="btn btn-dark emoji-btn">👻</button>
                            <button type="button" class="btn btn-dark emoji-btn">🧟</button>
                            <button type="button" class="btn btn-dark emoji-btn">💀</button>
                            <div class="emoji-section-title">Motor & Deportes</div>
                            <button type="button" class="btn btn-dark emoji-btn">🏎️</button>
                            <button type="button" class="btn btn-dark emoji-btn">🏍️</button>
                            <button type="button" class="btn btn-dark emoji-btn">⚽</button>
                            <button type="button" class="btn btn-dark emoji-btn">🥊</button>
                            <div class="emoji-section-title">Música</div>
                            <button type="button" class="btn btn-dark emoji-btn">🎸</button>
                            <button type="button" class="btn btn-dark emoji-btn">🎹</button>
                            <button type="button" class="btn btn-dark emoji-btn">🎧</button>
                        </div>
                    </div>
                    <input type="text" name="icon_emoji" id="emoji-in" class="form-control" placeholder="🎮">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Crear Categoría</button>
            <a href="/admin" class="btn btn-link w-100 mt-2 text-secondary text-decoration-none">Cancelar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.emoji-btn').forEach(b => {
            b.onclick = () => document.getElementById('emoji-in').value = b.innerText;
        });
    </script>
</body>
</html>
